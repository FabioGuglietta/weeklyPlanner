<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Weekly Planner</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="page">
    <header class="topbar">
      <h1>Weekly Planner</h1>
      <div class="actions">
        <button id="exportBtn">Export JSON</button>
        <label class="importBtn">
          Import JSON
          <input id="importInput" type="file" accept="application/json" />
        </label>
        <button id="resetWeekBtn">Reset settimana</button>
        <button id="resetAllBtn" class="danger">Reset tutto</button>
      </div>
    </header>

    <section class="planner-card">
      <table class="schedule" id="scheduleTable">
        <thead>
          <tr>
            <th class="time-col">TIME</th>
            <th>MONDAY</th>
            <th>TUESDAY</th>
            <th>WEDNESDAY</th>
            <th>THURSDAY</th>
            <th>FRIDAY</th>
          </tr>
        </thead>
        <tbody id="scheduleBody"></tbody>
      </table>
    </section>

    <section class="projects-section">
      <h2>PROJECTS</h2>
      <p class="projects-help">Clicca in una cella per scrivere. Usa il pulsante + per aggiungere una colonna progetto.</p>
      <table class="projects" id="projectsTable">
        <thead id="projectsHead"></thead>
        <tbody id="projectsBody"></tbody>
      </table>
    </section>
  </main>

  <template id="slotTemplate">
    <select class="slot-select"></select>
  </template>

  <script src="app.js"></script>
</body>
</html>
